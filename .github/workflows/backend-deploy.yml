name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-deploy.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mingcai-backend

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run backend tests
        run: pytest -q

      - name: Normalize image owner
        id: image_owner
        shell: bash
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_owner.outputs.value }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$DEPLOY_USERNAME@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin && \
            docker compose --env-file .env.production -f compose.server.yml pull && \
            docker compose --env-file .env.production -f compose.server.yml up -d --remove-orphans"

      - name: Verify deployment health
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        run: |
          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$DEPLOY_USERNAME@$DEPLOY_HOST" \
            'for endpoint in /v1/health /v1/health/version; do
              attempt=1
              until [ "$attempt" -gt 12 ]; do
                response=$(curl --silent --show-error --fail http://127.0.0.1:8000${endpoint} 2>/tmp/mingcai-health.err) && break
                cat /tmp/mingcai-health.err
                sleep 5
                attempt=$((attempt + 1))
              done

              if [ "$attempt" -gt 12 ]; then
                echo "Health verification failed for ${endpoint}" >&2
                exit 1
              fi

              echo "$response"
            done'
