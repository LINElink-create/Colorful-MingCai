services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/mingcai-backend:${IMAGE_TAG}
    container_name: mingcai-backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s